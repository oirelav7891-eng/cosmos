<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#020111">
<title>Countdown COSMOS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron', sans-serif;
}

html, body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  height:100vh;
  background:#000;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* 🌍 SFONDO TERRA */
.earth{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:100%;
  background: url("earth-4k.jpg") center bottom / cover no-repeat;
  z-index:-3;

  animation: earthPulse 12s ease-in-out infinite;

  filter: contrast(1.15) saturate(1.25) brightness(0.95);
}

/* 🌍 PULSAZIONE ZOOM */
@keyframes earthPulse {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.035);
  }
  100% {
    transform: scale(1);
  }
}

/* atmosfera soft */
.atmosphere{
  position:absolute;
  inset:0;
  background: radial-gradient(circle at bottom, rgba(0,180,255,0.25), transparent 60%);
  z-index:-2;
}

/* nebula */
.nebula{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,255,0.10), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(255,0,255,0.08), transparent 45%);
  filter: blur(40px);
  z-index:-1;
  animation:pulseNebula 10s infinite alternate;
}

@keyframes pulseNebula{
  from{ transform:scale(1); }
  to{ transform:scale(1.08); }
}

/* container */
.container{
  width:90%;
  max-width:1000px;
  padding:clamp(20px, 5vw, 50px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:24px;
  background:rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(0,140,255,0.25);
  text-align:center;
}

.title{
  font-size:clamp(1.6rem, 4vw, 2.6rem);
  letter-spacing:3px;
  text-transform:uppercase;
  color:#7df9ff;
  text-shadow:0 0 12px #00eaff;
  animation:pulseTitle 2.5s infinite ease-in-out;
  display:flex;
  flex-direction:column;
  align-items:center;
  line-height:1.2;
}

.title .cosmos{
  font-size:clamp(2rem, 5vw, 3rem);
  letter-spacing:6px;
}

@keyframes pulseTitle{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}

.subtitle{
  margin-top:10px;
  margin-bottom:40px;
  font-size:1rem;
  letter-spacing:2px;
  color:#b6cfff;
  opacity:0.85;
}

.countdown{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:20px;
}

.time-box{
  background:rgba(10,20,40,0.7);
  border:1px solid rgba(125,249,255,0.2);
  border-radius:20px;
  padding:20px 10px;
}

.number{
  font-size:clamp(2rem, 8vw, 4rem);
  font-weight:800;
  text-shadow:0 0 10px #00d9ff;
}

.label{
  margin-top:10px;
  font-size:0.9rem;
  letter-spacing:3px;
  color:#7df9ff;
  text-transform:uppercase;
}

@media(max-width:768px){
  .countdown{ grid-template-columns:repeat(2, 1fr); }
}

@media(max-width:480px){
  .countdown{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="earth"></div>
<div class="atmosphere"></div>
<div class="nebula"></div>

<div class="container">

  <div class="title">
    <div>Il grande evento</div>
    <div class="cosmos">COSMOS</div>
    <div>sta per arrivare!</div>
  </div>

  <div class="subtitle">Il futuro è in attesa...</div>

  <div class="countdown">
    <div class="time-box"><div class="number" id="days">00</div><div class="label">Giorni</div></div>
    <div class="time-box"><div class="number" id="hours">00</div><div class="label">Ore</div></div>
    <div class="time-box"><div class="number" id="minutes">00</div><div class="label">Minuti</div></div>
    <div class="time-box"><div class="number" id="seconds">00</div><div class="label">Secondi</div></div>
  </div>

</div>

<script>
const targetDate = new Date("June 25, 2027 00:00:00").getTime();

function updateCountdown(){
  const now = new Date().getTime();
  const distance = targetDate - now;

  if(distance < 0){
    document.querySelector('.countdown').innerHTML =
      `<div style="grid-column:1/-1;font-size:2rem;color:#7df9ff;">
        Missione Avviata 🚀
      </div>`;
    return;
  }

  document.getElementById('days').textContent =
    Math.floor(distance / (1000*60*60*24));

  document.getElementById('hours').textContent =
    Math.floor((distance%(1000*60*60*24))/(1000*60*60)).toString().padStart(2,'0');

  document.getElementById('minutes').textContent =
    Math.floor((distance%(1000*60*60))/(1000*60)).toString().padStart(2,'0');

  document.getElementById('seconds').textContent =
    Math.floor((distance%(1000*60))/1000).toString().padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown,1000);
</script>

</body>
</html>
