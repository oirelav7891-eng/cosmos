<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown 25 Giugno 2027</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap');
    :root {
      --bg: #020617;
      --card: rgba(10, 15, 35, 0.72);
      --text: #e2e8f0;
      --accent: #38bdf8;
      --secondary: #94a3b8;
      --shadow: 0 0 50px rgba(56, 189, 248, 0.18);
      --radius: 28px;
      --font: 'Segoe UI', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: var(--font);
      background:
        radial-gradient(circle at center, rgba(0,180,255,0.08), transparent 35%),
        radial-gradient(circle at top, #08111f 0%, #020617 55%, #000000 100%);
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    .stars,
    .stars::after,
    .stars::before {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      box-shadow:
        20vw 10vh white,
        80vw 20vh white,
        40vw 80vh white,
        70vw 70vh white,
        10vw 60vh white,
        90vw 50vh white,
        50vw 30vh white,
        60vw 90vh white,
        25vw 40vh white,
        75vw 85vh white,
        15vw 25vh white,
        85vw 10vh white;
      content: '';
      animation: twinkle 4s infinite alternate;
    }

    .stars::before {
      transform: scale(1.5);
      opacity: 0.7;
    }

    .stars::after {
      transform: scale(0.7);
      opacity: 0.5;
    }

    @keyframes twinkle {
      from {
        opacity: 0.4;
      }
      to {
        opacity: 1;
      }
    }

    

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1000px;
      text-align: center;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(56,189,248,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,0.7), transparent);
      pointer-events: none;
    }

    .card {
      background: linear-gradient(180deg, rgba(8,20,40,0.72), rgba(5,10,25,0.55));
      border: 1px solid rgba(56,189,248,0.25);
      border-radius: var(--radius);
      padding: 50px 32px;
      backdrop-filter: blur(22px);
      box-shadow:
        0 0 50px rgba(56,189,248,0.18),
        inset 0 0 30px rgba(56,189,248,0.08);
      position: relative;
      overflow: hidden;
    }

    h1 {
      will-change: transform, opacity;
      transform-origin: center center;
      backface-visibility: hidden;
      perspective: 1000px;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      margin-bottom: 16px;
      letter-spacing: 2px;
      color: #dff8ff;
      text-shadow:
        0 0 8px rgba(56,189,248,0.9),
        0 0 22px rgba(56,189,248,0.8),
        0 0 45px rgba(56,189,248,0.45);
      animation: hologramBreath 4s linear infinite;
    }

    .subtitle {
      font-family: 'Orbitron', sans-serif;
      color: var(--secondary);
      margin-bottom: 42px;
      font-size: clamp(1rem, 2vw, 1.3rem);
      letter-spacing: 1px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
    }

    .time-box {
      background: rgba(255,255,255,0.04);
      border-radius: 22px;
      padding: 28px 12px;
      border: 1px solid rgba(56,189,248,0.12);
      box-shadow: inset 0 0 20px rgba(56,189,248,0.06);
    }

    .number {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.2rem);
      font-weight: 700;
      color: #7dd3fc;
      margin-bottom: 8px;
      text-shadow:
        0 0 10px rgba(56,189,248,0.9),
        0 0 30px rgba(56,189,248,0.6);
      animation: none;
      transform: translateZ(0) scale3d(0.97, 0.97, 1);
    }

    .label {
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--secondary);
    }

    @keyframes hologramBreath {
      0% {
        opacity: 0.96;
        transform: translateZ(0) scale3d(0.97, 0.97, 1);
      }

      50% {
        opacity: 1;
        transform: translateZ(0) scale3d(1.015, 1.015, 1);
      }

      100% {
        opacity: 0.96;
        transform: translateZ(0) scale3d(0.97, 0.97, 1);
      }
    }
      25% {
        opacity: 1;
      }
      50% {
        opacity: 0.88;
      }
      75% {
        opacity: 1;
      }
      100% {
        opacity: 0.93;
      }
    }

    @keyframes pulseGlow {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.04);
      }
      100% {
        transform: scale(1);
      }
    }

    .holo-ring {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      border: 1px solid rgba(56,189,248,0.12);
      box-shadow: 0 0 80px rgba(56,189,248,0.08);
      animation: rotateRing 30s linear infinite;
      z-index: 0;
    }

    .holo-ring::before,
    .holo-ring::after {
      content: '';
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      border: 1px dashed rgba(56,189,248,0.15);
    }

    .holo-ring::after {
      inset: 100px;
      animation: rotateRingReverse 16s linear infinite;
    }

    @keyframes rotateRing {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes rotateRingReverse {
      from {
        transform: rotate(360deg);
      }
      to {
        transform: rotate(0deg);
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 32px 20px;
      }

      .countdown {
        gap: 14px;
      }

      .spaceship {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="holo-ring"></div>
  

  <div class="container">
    <div class="card">
      <h1>IL GRANDE EVENTO COSMOS È IN ARRIVO!</h1>
      <p class="subtitle">Il futuro è in attesa...</p>

      <div class="countdown">
        <div class="time-box">
          <div class="number" id="days">0</div>
          <div class="label">Giorni</div>
        </div>

        <div class="time-box">
          <div class="number" id="hours">0</div>
          <div class="label">Ore</div>
        </div>

        <div class="time-box">
          <div class="number" id="minutes">0</div>
          <div class="label">Minuti</div>
        </div>

        <div class="time-box">
          <div class="number" id="seconds">0</div>
          <div class="label">Secondi</div>
        </div>
      </div>

      
    </div>
  </div>

  <script>
    const targetDate = new Date('2027-06-25T00:00:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.querySelector('.countdown').innerHTML = '<h2>Il countdown è terminato!</h2>';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = days;
      document.getElementById('hours').textContent = hours;
      document.getElementById('minutes').textContent = minutes;
      document.getElementById('seconds').textContent = seconds;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    const title = document.querySelector('h1');

    function syncPulse() {
      title.animate(
        [
          {
            transform: 'translateZ(0) scale3d(0.97,0.97,1)',
            opacity: 0.96
          },
          {
            transform: 'translateZ(0) scale3d(1.015,1.015,1)',
            opacity: 1,
            offset: 0.5
          },
          {
            transform: 'translateZ(0) scale3d(0.97,0.97,1)',
            opacity: 0.96
          }
        ],
        {
          duration: 2000,
          iterations: 1,
          easing: 'linear'
        }
      );
    }

    syncPulse();
    setInterval(syncPulse, 2000);

    
  </script>
</body>
</html>
