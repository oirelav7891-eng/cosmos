<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Countdown 2027</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Rajdhani',sans-serif;

background:
linear-gradient(
rgba(2,8,20,0.45),
rgba(0,0,0,0.60)
),
url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?fm=jpg&q=100&w=2400')
center center / cover no-repeat;

color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
position:relative;
}

/* glow animato */
body::before{
content:"";
position:absolute;
width:700px;
height:700px;

background:
radial-gradient(circle,
rgba(0,255,255,.10),
transparent 70%);

filter:blur(35px);

top:-180px;
left:-180px;

animation:float 10s ease-in-out infinite;
}

/* alone cinematico */
body::after{
content:"";
position:absolute;
inset:0;

background:
radial-gradient(circle at center,
rgba(0,255,255,0.04),
transparent 60%);

pointer-events:none;
}

@keyframes float{
0%,100%{transform:translate(0,0);}
50%{transform:translate(120px,80px);}
}

.container{
position:relative;
z-index:2;

text-align:center;

padding:55px 45px;

background:rgba(10,20,35,0.32);

border-radius:28px;

backdrop-filter:blur(18px);

box-shadow:
0 0 25px rgba(0,255,255,.10),
0 0 80px rgba(0,180,255,.05);

width:90%;
max-width:720px;

border:1px solid rgba(120,220,255,.15);
}

h1{
font-family:'Orbitron',sans-serif;
color:#7ffcff;

margin-bottom:12px;

letter-spacing:2px;

font-size:2rem;

text-shadow:
0 0 10px rgba(0,255,255,.35),
0 0 25px rgba(0,255,255,.15);

animation:pulse 3s infinite;
}

/* 🔥 pulsazione titolo */
@keyframes pulse{
0%,100%{
transform:scale(1);
text-shadow:
0 0 10px rgba(0,255,255,.35),
0 0 25px rgba(0,255,255,.20);
}

50%{
transform:scale(1.08);
text-shadow:
0 0 15px rgba(0,255,255,.55),
0 0 40px rgba(0,255,255,.35);
}
}

/* ✨ SCRITTA INFERIORE STATICA */
.description{
font-family:'Orbitron',sans-serif;
color:#7ffcff;
margin-bottom:30px;
font-size:1.1rem;
letter-spacing:1.5px;
opacity:.9;

text-shadow:
0 0 8px rgba(0,255,255,.30),
0 0 18px rgba(0,255,255,.15);
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:30px;
}

.box{
background:rgba(0,255,255,.05);
padding:22px 15px;
border-radius:20px;
text-align:center;
border:1px solid rgba(0,255,255,.10);
transition:.35s ease;
box-shadow:0 0 10px rgba(0,255,255,.03);
}

.box:hover{
transform:translateY(-6px);
box-shadow:0 0 25px rgba(0,255,255,.18);
border-color:rgba(0,255,255,.25);
}

.number{
font-size:2.8rem;
font-family:'Orbitron',sans-serif;
color:#b8ffff;
text-shadow:
0 0 10px rgba(0,255,255,.35),
0 0 25px rgba(0,255,255,.15);
}

.label{
font-size:.9rem;
text-transform:uppercase;
margin-top:8px;
letter-spacing:2px;
color:#e1f9ff;
}

/* tablet */
@media(max-width:700px){

.container{padding:40px 25px;}

h1{font-size:1.5rem;}

.countdown{
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.number{font-size:2.2rem;}
}

/* smartphone */
@media(max-width:450px){

body{
padding:20px;
align-items:flex-start;
}

.container{
width:100%;
padding:28px 18px;
border-radius:18px;
backdrop-filter:blur(12px);
}

h1{
font-size:1.1rem;
letter-spacing:1px;
}

.description{
font-size:0.95rem;
margin-bottom:20px;
}

.countdown{
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.box{
padding:16px 10px;
border-radius:16px;
}

.number{font-size:1.9rem;}

.label{
font-size:.75rem;
letter-spacing:1px;
}
}

html, body{
-webkit-text-size-adjust:100%;
}

</style>
</head>

<body>

<div class="container">

<h1>IL GRANDE EVENTO COSMOS STA ARRIVANDO!</h1>

<div class="description">
Il futuro è in attesa...
</div>

<div class="countdown">

<div class="box">
<div class="number" id="days">00</div>
<div class="label">Giorni</div>
</div>

<div class="box">
<div class="number" id="hours">00</div>
<div class="label">Ore</div>
</div>

<div class="box">
<div class="number" id="minutes">00</div>
<div class="label">Minuti</div>
</div>

<div class="box">
<div class="number" id="seconds">00</div>
<div class="label">Secondi</div>
</div>

</div>

</div>

<script>

const targetDate = new Date("2027-06-25T00:00:00");

function tick(){

const now = new Date().getTime();
const distance = targetDate - now;

if(distance <= 0){
document.getElementById("days").textContent = "00";
document.getElementById("hours").textContent = "00";
document.getElementById("minutes").textContent = "00";
document.getElementById("seconds").textContent = "00";
return;
}

document.getElementById("days").textContent =
String(Math.floor(distance/(1000*60*60*24))).padStart(2,"0");

document.getElementById("hours").textContent =
String(Math.floor((distance/(1000*60*60))%24)).padStart(2,"0");

document.getElementById("minutes").textContent =
String(Math.floor((distance/(1000*60))%60)).padStart(2,"0");

document.getElementById("seconds").textContent =
String(Math.floor((distance/1000)%60)).padStart(2,"0");

}

setInterval(tick,1000);
tick();

</script>

</body>
</html>
