<!-- 🌍 SFONDO TERRA -->
<style>
.earth{
  position:absolute;
  inset:0;

  /* zoom iniziale aumentato */
  background: url("earth-4k.jpg") center bottom / 130% no-repeat;

  z-index:-3;

  /* pulsazione MOLTO più lenta */
  animation: earthPulse 32s ease-in-out infinite;

  filter:
    contrast(1.15)
    saturate(1.2)
    brightness(0.92);

  transform-origin:center center;

  will-change: transform;
}

/* 🌌 zoom cosmico lento */
@keyframes earthPulse {

  /* stato iniziale */
  0%{
    transform: scale(1);

    filter:
      contrast(1.1)
      saturate(1.15)
      brightness(0.92);
  }

  /* zoom più profondo ma lentissimo */
  50%{
    transform: scale(1.20);

    filter:
      contrast(1.28)
      saturate(1.35)
      brightness(1);
  }

  /* ritorno fluido */
  100%{
    transform: scale(1);

    filter:
      contrast(1.1)
      saturate(1.15)
      brightness(0.92);
  }
}
</style>
